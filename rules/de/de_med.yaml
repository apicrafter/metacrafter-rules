name: de-medical
description: Deutsche medizinische Kataloge und Codes
context: medical
lang: de
country_code: de
rules:
  deicd10field:
    key: icd10code
    name: ICD-10-Code anhand deutscher Feldnamen
    rule: icd10,icd_10,diagnosecode,diagnose_code
    type: field
    match: text
  deicd10value:
    key: icd10code
    name: ICD-10-Code anhand des Wertes
    match: ppr
    type: data
    rule: Word('ABCDEFGHIJKLMNOPQRSTUVWXYZ', exact=1) + Word(nums, exact=2) + Optional(Literal('.').suppress() + Word(nums, min=1, max=2))
    maxlen: 7
    minlen: 3
  deatcfield:
    key: atccode
    name: ATC-Code anhand deutscher Feldnamen
    rule: atc_code,atccode,arzneimittel_atc,who_atc
    type: field
    match: text
  deatcvalue:
    key: atccode
    name: ATC-Code anhand des Wertes
    match: ppr
    type: data
    rule: Word('ABCDEFGHIJKLMNOPQRSTUVWXYZ', exact=1) + Word(nums, exact=2) + Word('ABCDEFGHIJKLMNOPQRSTUVWXYZ', exact=1) + Word(nums, exact=2)
    maxlen: 7
    minlen: 7
  deopsfield:
    key: opscode
    name: OPS-Prozedurcode anhand Feldnamen
    rule: ops_code,opscode,ops,prozedur_code
    type: field
    match: text
# This rule generates a lot of False positives because the pattern matches any 4-digit number (with optional decimal)
# Many common values match this pattern: years (2023, 2024), product codes, reference numbers, version numbers, etc.
# It is marked as imprecise and could be filtered if it's set
# Validator added to reduce false positives by filtering out year patterns
  deopsvalue:
    key: opscode
    name: OPS-Prozedurcode anhand des Wertes
    match: ppr
    type: data
    rule: Word(nums, exact=1) + Word(nums, exact=1) + Word(nums, exact=2) + Optional(Literal('.').suppress() + Word(nums, min=1, max=2))
    maxlen: 7
    minlen: 4
    validator: metacrafterext.rules.de.validators.validate_de_ops
    imprecise: 1
    priority: 2
