name: de-transport
description: German transport identifiers
context: transport
lang: de
country_code: de
rules:
  devehicleplatefield:
    key: de_vehicle_plate
    name: German vehicle license plate by field name
    rule: kennzeichen,nummernschild,fahrzeugkennzeichen,license_plate,registration_plate,de_plate
    type: field
    match: text
    priority: 1
  devehicleplatevalue:
    key: de_vehicle_plate
    name: German vehicle license plate by pattern
    match: ppr
    type: data
    rule: Word(alphas, min=1, max=3) + Literal('-').suppress() + Word(alphas, min=1, max=2) + Optional(Literal(' ').suppress()) + Word(nums, min=1, max=4)
    minlen: 5
    maxlen: 10
    priority: 1
    validator: metacrafterext.rules.de.transport.validate_de_vehicle_plate

