name: in-datetime
description: Indian date and time formats
context: datetime
lang: hi
country_code: in
rules:
  indatefield:
    key: indate
    name: Indian date format by field name
    rule: hindi_date,indian_date,तारीख,दिनांक
    type: field
    match: text
  indatevalue:
    key: indate
    name: Indian date format by pattern
    match: ppr
    type: data
    rule: Word(nums, exact=2) + Literal('/') + Word(nums, exact=2) + Literal('/') + Word(nums, exact=4) | Word(nums, exact=2) + Literal('-') + Word(nums, exact=2) + Literal('-') + Word(nums, exact=4)
    maxlen: 10
    minlen: 10
    imprecise: 1

