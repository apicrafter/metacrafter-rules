name: tr-persons
description: Turkish person identifiers
context: persons
lang: tr
country_code: tr
rules:
  tr_persons_trtckimlikfield:
    key: trtckimlik
    is_pii: True
    name: Turkish TC Kimlik No by field name
    rule: tc_kimlik,tc_kimlik_no,tckimlik,tc_no,turkish_id,national_id,turkish_national_id
    type: field
    match: text
  tr_persons_trtckimlikvalue:
    key: trtckimlik
    is_pii: True
    name: Turkish TC Kimlik No by pattern
    match: ppr
    type: data
    rule: Word(nums, exact=11)
    validator: metacrafterext.rules.common.identifiers.validate_tr_tckimlik
    maxlen: 11
    minlen: 11
  tr_persons_trpassportfield:
    key: trpassport
    is_pii: True
    name: Turkish passport by field name
    rule: pasaport,passport_number,pasaport_numarası,pasaport_no
    type: field
    match: text
# Disabled: matches any alphanumeric string 6-9 chars, so most generic
# ids/codes/words are flagged. A Turkish passport number cannot be distinguished
# from an arbitrary alphanumeric value; rely on trpassportfield instead.
#  trpassportvalue:
#    key: trpassport
#    is_pii: True
#    name: Turkish passport by pattern
#    match: ppr
#    type: data
#    rule: Word(alphanums, min=6, max=9)
#    maxlen: 9
#    minlen: 6
  tr_persons_trdriverlicfield:
    key: trdriverlic
    is_pii: True
    name: Turkish driver license by field name
    rule: sürücü_belgesi,sürücü_belge_no,ehliyet,ehliyet_no
    type: field
    match: text
  tr_persons_trdriverlicvalue:
    key: trdriverlic
    is_pii: True
    name: Turkish driver license by pattern
    match: ppr
    type: data
    rule: Word(alphanums, min=8, max=12)
    maxlen: 12
    minlen: 8
    imprecise: 1

