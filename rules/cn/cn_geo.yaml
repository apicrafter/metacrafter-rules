name: cn-geo
description: Chinese geographic identifiers
context: geo
lang: zh
country_code: cn
rules:
  cnpostcodeknown:
    key: postcode
    name: Chinese postal code (邮政编码) by known name
    rule: 邮编,邮政编码,邮编号码
    type: field
    match: text
    priority: 1
  cncityknown:
    key: city
    name: Chinese city by known name
    rule: 城市,市,城市名称
    type: field
    match: text
    priority: 1
  cnprovinceknown:
    key: province
    name: Chinese province by known name
    rule: 省,省份,省区,省级
    type: field
    match: text
    priority: 1

