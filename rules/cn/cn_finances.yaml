    priority: 1
  cntaxidknown:
    key: taxid
    name: Chinese tax ID (统一社会信用代码) by known name
    rule: 统一社会信用代码,税号,税务登记号,纳税人识别号,组织机构代码
    type: field
    match: text
    priority: 1

