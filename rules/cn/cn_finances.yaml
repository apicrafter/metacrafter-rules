name: cn-finances
description: Chinese financial identifiers
context: finances
lang: zh
country_code: cn
rules:
  cnbankaccountknown:
    key: bankaccount
    name: Chinese bank account by known name
    rule: 银行账号,账户,账号,银行账户,账户号码
