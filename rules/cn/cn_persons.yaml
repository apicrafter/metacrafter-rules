name: cn-persons
description: Chinese person identifiers
context: persons
lang: zh
country_code: cn
rules:
  cnidcardknown:
    key: idcard
    is_pii: True
    name: Chinese ID card (身份证) by known name
    rule: 身份证,身份证号,身份证号码,居民身份证,身份证件号码
    type: field
