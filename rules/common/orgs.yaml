name: orgs
description: Companies identifiers
context: companies
lang: common
country_code: xx
rules:
  companynameknown:
    key: orgname
    name: Company name known names
    rule: legalname,companyname,orgname,org_name,company_name,organization_name,legal_name,organizationname,company
      name
    type: field
    match: text
  dunsfield:
    key: duns
    name: Data Universal Numbering System (DUNS) by field name
    rule: duns,duns_number,duns_num,d_u_n_s,dun_number
    type: field
    match: text
    priority: 1
  dunsvalue:
    key: duns
    name: Data Universal Numbering System (DUNS) by value pattern
    match: ppr
    type: data
    rule: Word(nums, exact=9)
    maxlen: 9
    minlen: 9
    priority: 1
    validator: metacrafterext.rules.common.identifiers.validate_duns
    imprecise: 1
  companycompanybyknown:
    key: company_company
    name: Company Company
    match: text
    type: field
    rule: company,companyId,companyid,company_companyid,company_recid
    priority: 1
