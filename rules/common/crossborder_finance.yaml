name: crossborder-finance
description: Cross-border banking and payment identifiers
context: finances
lang: common
country_code: xx
rules:
  ibanfield:
    key: iban
    name: International Bank Account Number by field name
    rule: iban,iban_account,iban_number,international_bank_account
    type: field
    match: text
  ibanvalue:
    key: iban
    name: International Bank Account Number by value pattern
    match: ppr
    type: data
    rule: Word('ABCDEFGHIJKLMNOPQRSTUVWXYZ', exact=2) + Word(nums, exact=2) + Word(alphanums, min=10, max=28)
    maxlen: 34
    minlen: 14
    validator: metacrafterext.rules.common.identifiers.validate_iban
  bicfield:
    key: bic
    name: SWIFT/BIC code by field name
    rule: bic,swift,swift_code,swiftbic
    type: field
    match: text
  bicvalue:
    key: bic
    name: SWIFT/BIC code by value pattern
    match: ppr
    type: data
    rule: Word('ABCDEFGHIJKLMNOPQRSTUVWXYZ', exact=4) + Word('ABCDEFGHIJKLMNOPQRSTUVWXYZ', exact=2) + Word('ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789', exact=2) + Optional(Word('ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789', exact=3))
    maxlen: 11
    minlen: 8
  leifield:
    key: lei
    name: Legal Entity Identifier by field name
    rule: lei,legal_entity_identifier,lei_code,lei_number,legal_entity_id
    type: field
    match: text
    priority: 1
  leivalue:
    key: lei
    name: Legal Entity Identifier by value pattern
    match: ppr
    type: data
    rule: Word('0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ', exact=18) + Word(nums, exact=2)
    maxlen: 20
    minlen: 20
    priority: 1
    validator: metacrafterext.rules.common.identifiers.validate_lei
  figifield:
    key: figi
    name: Financial Instrument Global Identifier by field name
    rule: figi,financial_instrument_identifier,bbgid,bloomberg_id,figi_code
    type: field
    match: text
    priority: 1
  figivalue:
    key: figi
    name: Financial Instrument Global Identifier by value pattern
    match: ppr
    type: data
    rule: Word('0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ', exact=12)
    maxlen: 12
    minlen: 12
    priority: 1
    validator: metacrafterext.rules.common.identifiers.validate_figi
  isinfield:
    key: isin
    name: International Securities Identification Number by field name
    rule: isin,isin_code,isin_number,security_id,security_identifier
    type: field
    match: text
    priority: 1
  isinvalue:
    key: isin
    name: International Securities Identification Number by value pattern
    match: ppr
    type: data
    rule: Word('ABCDEFGHIJKLMNOPQRSTUVWXYZ', exact=2) + Word('0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ', exact=10)
    maxlen: 12
    minlen: 12
    priority: 1
    validator: metacrafterext.rules.common.identifiers.validate_isin

