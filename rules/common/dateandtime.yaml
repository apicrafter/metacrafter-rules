name: commondateandtime
description: Common date and time related rules
context: datetime
lang: common
country_code: xx
rules:
  datetimeknown:
    key: datetime
    name: DateTime known names
    rule: created_at,updated_at,created,updated,createdAt,updatedAt,creat_dt,deleted_at,datetime
    type: field
    match: text
    priority: 1
  dateknown:
    key: date
    name: Date by known name
    rule: date,created_date,creation_date,end_date,responsedate,createddate,completiondatem,start_date,end_date,report_date,actiondate,issue_date,closed_date,due_date,date_of_last_change,claimdate
    type: field
    match: text
    priority: 1
  yearbydatafiltered:
    key: year
    name: Modern years in range 1001-2199 by data and fieldname
    maxlen: 4
    minlen: 4
    rule: (Literal('1') + Word(nums, exact=3)) ^ (Literal('2') + Word('01', exact=1)
      + Word(nums, exact=2))
    match: ppr
    type: data
    fieldrule: Optional(Word(printables)) + Literal('year') + Optional(Word(printables))
    fieldrulematch: ppr
    priority: 2
  yearknown:
    key: year
    name: Year by known name
    rule: year,yearnum
    type: field
    match: text
    priority: 1
  yearknownpat:
    key: year
    name: Year by known name pattern
    rule: Word(printables) + "year" +  lineEnd
    type: field
    match: ppr
    priority: 2
  timestampknown:
    key: unixtime
    name: Timestamp by known name
    rule: timestamp
    type: field
    match: text
    priority: 1
  timestampknownpat:
    key: unixtime
    name: Timestamp by known name pattern
    rule: Word(printables) + "timestamp" +  lineEnd
    type: field
    match: ppr
    priority: 2
  timezoneknown:
    key: timezone
    name: Timezone by known name
    rule: timezone
    type: field
    match: text
    priority: 1
  timezoneknownpat:
    key: timezone
    name: Timezone by known name pattern
    rule: Word(printables) + "timezone" +  lineEnd
    type: field
    match: ppr
    priority: 2
  monthknownpat:
    key: month
    name: Month by known name pattern
    rule: Word(printables) + Literal("month")
    type: field
    match: ppr
    priority: 2
  monthknown:
    key: month
    name: Month by known name
    rule: month,monthnum
    type: field
    match: text
    priority: 1
  yearbydataimprecise:
    key: year
    name: Modern years in range 1900-2100 by data
    maxlen: 4
    minlen: 4
    rule: (Literal('19') + Word(nums, exact=2)) ^ (Literal('20') + Word(nums, exact=2))
    match: ppr
    type: data
    fieldrule: Optional(Word(printables)) + (CaselessLiteral('year') | CaselessLiteral('date')
      | CaselessLiteral('time')) + Optional(Word(printables))
    fieldrulematch: ppr
    imprecise: 1
    priority: 3
  timestampdatebyknown:
    key: timestamp_date
    name: Timestamp Date
    match: text
    type: field
    rule: registration_timestamp,modification_timestamp,valid_until_timestamp,valid_from_timestamp
    priority: 1
  createddatebyknown:
    key: created_date
    name: Created date timestamp
    match: text
    type: field
    rule: created_by,createdby,created_on,date_created
    priority: 1
  modifieddatebyknown:
    key: modified_date
    name: Modified date timestamp
    match: text
    type: field
    rule: lastmodifiedby,modified,lastmodifieddate,modified_by
    priority: 1
  updateddatebyknown:
    key: updated_date
    name: Updated date timestamp
    match: text
    type: field
    rule: updated_by,updated_on,last_updated,date_updated
    priority: 1
  datedatebyknown:
    key: date_date
    name: Date Date
    match: text
    type: field
    rule: expiry_date,settlement_date,maturity_date,update_time
    priority: 1
  timedatebyknown:
    key: time_date
    name: Time Date
    match: text
    type: field
    rule: create_time,create_time_,start_time,end_time
    priority: 1
