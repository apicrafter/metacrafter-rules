name: persons
description: Persons identifiers
context: persons
lang: common
country_code: xx
rules:
  fullname:
    key: person_fullname
    is_pii: true
    name: Person full name by known
    rule: applicant_fullname,owner_fullname,person_fullname
    type: field
    match: text
    priority: 1
  surname:
    key: person_surname
    is_pii: true
    name: Person surname by known
    rule: surname,lastname,sur_name,last_name,name_last,owner_last_name,familyname
    type: field
    match: text
    priority: 1
  firstname:
    key: person_firstname
    is_pii: true
    name: Person firstname by known
    rule: firstname,forename,first_name,candidate_first_name,owner_first_name,client_first_name,givenname,First
      Name
    type: field
    match: text
    priority: 1
  midname:
    key: person_midname
    is_pii: true
    name: Person midname by known
    rule: midname,secondname,middlename,mid_name,middle_name,second_name,patronymicname,Last
      Name
    type: field
    match: text
    priority: 1
  firstnamepat:
    key: person_firstname
    is_pii: true
    name: Person firstname by known
    rule: Word(printables) + "firstname" +  lineEnd
    type: field
    match: ppr
    priority: 2
  surnamepat:
    key: person_surname
    is_pii: true
    name: Person surname by known
    rule: Word(printables) + "surname" +  lineEnd
    type: field
    match: ppr
    priority: 2
  lastnamepat:
    key: person_surname
    is_pii: true
    name: Person lastname by known
    rule: Word(printables) + "lastname" +  lineEnd
    type: field
    match: ppr
    priority: 2
  midnamepat:
    key: person_midname
    is_pii: true
    name: Person midname by known
    rule: Word(printables) + "midname" +  lineEnd
    type: field
    match: ppr
    priority: 2
  emailpersonbyknown:
    key: email_person
    name: Email Person
    match: text
    type: field
    rule: email_adres,mber_email_adres,applcnt_email_adres,mngr_email_adres,emailfromaddress
    priority: 1
    is_pii: true
  avatarpersonbyknown:
    key: avatar_person
    name: Avatar Person
    match: text
    type: field
    rule: avatar_url
    priority: 1
