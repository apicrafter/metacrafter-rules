name: identifiers
description: Basic identifiers
context: identifiers
lang: common
country_code: xx
rules:
  uuidbyvalue:
    key: uuid
    name: Universally unique identifier (UUID)
    rule: Word(hexnums, exact=8) + Literal('-').suppress() + Word(hexnums, exact=4) + Literal('-').suppress() + Word(hexnums, exact=4) + Literal('-').suppress() + Word(hexnums, exact=4) + Literal('-').suppress() + Word(hexnums, exact=12)
    maxlen: 36
    minlen: 36
    priority: 1
    match: ppr
    type: data
  uuidbyname:
    key: uuid
    name: Universally unique identifier (UUID) by name
    rule: uuid
    match: text
    type: field
    priority: 1
  guidbyname:
    key: guid
    name: Globally unique identifier (GUID) by name
    rule: guid
    match: text
    type: field
    priority: 1
  guid:
    key: guid
    name: Globally unique identifier (GUID) by value
    rule: Literal('{').suppress() + Word(hexnums, exact=8) + Literal('-').suppress() + Word(hexnums, exact=4) + Literal('-').suppress() + Word(hexnums, exact=4) + Literal('-').suppress() + Word(hexnums, exact=4) + Literal('-').suppress() + Word(hexnums, exact=12) + Literal('}').suppress()
    maxlen: 38
    minlen: 38
    priority: 1
    match: ppr
    type: data
  mongodbidfield:
    key: mongodbid
    name: MongoDB ObjectId by field name
    rule: mongodb_id,objectid,_id,mongo_id,mongodb_objectid,object_id
    match: text
    type: field
    priority: 1
  mongodbidvalue:
    key: mongodbid
    name: MongoDB ObjectId by value pattern
    match: ppr
    type: data
    rule: Word(hexnums, exact=24)
    maxlen: 24
    minlen: 24
    priority: 1
    validator: metacrafterext.rules.common.identifiers.validate_mongodb_objectid
  ulidfield:
    key: ulid
    name: ULID (Universally Unique Lexicographically Sortable Identifier) by field name
    rule: ulid,ulid_id,sortable_id,ulid_identifier
    match: text
    type: field
    priority: 1
  ulidvalue:
    key: ulid
    name: ULID (Universally Unique Lexicographically Sortable Identifier) by value pattern
    match: ppr
    type: data
    rule: Word('0123456789ABCDEFGHJKMNPQRSTVWXYZ', exact=26)
    maxlen: 26
    minlen: 26
    priority: 1
    validator: metacrafterext.rules.common.identifiers.validate_ulid
  snowflakeidfield:
    key: snowflake_id
    name: Snowflake ID by field name
    rule: snowflake_id,snowflake,discord_id,twitter_id,snowflake_number
    match: text
    type: field
    priority: 1
# Disabled: matches essentially any 15-19 digit integer (the validator only
# checks digit count and 64-bit range), so bigint primary keys, account numbers
# and other large numeric ids are flagged. A Snowflake ID has no reliable
# structural signature by value; rely on snowflakeidfield instead.
#  snowflakeidvalue:
#    key: snowflake_id
#    name: Snowflake ID by value pattern
#    match: ppr
#    type: data
#    rule: Word(nums, min=15, max=19)
#    maxlen: 19
#    minlen: 15
#    priority: 1
#    validator: metacrafterext.rules.common.identifiers.validate_snowflake_id
