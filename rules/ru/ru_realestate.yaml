name: ru-realestate
description: Russian real estate and property identifiers
context: realestate
lang: ru
country_code: ru
rules:
  rukadastrfield:
    key: rukadastr
    name: Russian cadastral number by field name
    rule: kadastr,kadastral_number,кадастровый_номер,кадастр,кадастровый_номер_участка
    type: field
    match: text
  rukadastrvalue:
    key: rukadastr
    name: Russian cadastral number by pattern
    match: ppr
    type: data
    rule: Word(nums, min=1, max=2) + Literal(':') + Word(nums, min=1, max=2) + Literal(':')
      + Word(nums, min=1, max=7) + Literal(':') + Word(nums, min=1, max=4)
    maxlen: 20
    minlen: 10
  rupropertynumberfield:
    key: rupropertynumber
    name: Russian property number by field name
    rule: property_number,номер_объекта,property_id,идентификатор_объекта,Номер объекта
    type: field
    match: text
  rupropertynumbervalue:
    key: rupropertynumber
    name: Russian property number by pattern
    match: ppr
    type: data
    rule: Word(alphanums, min=8, max=20)
    maxlen: 20
    minlen: 8
    imprecise: 1
