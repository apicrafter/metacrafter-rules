name: sa-persons
description: Saudi Arabian person identifiers
context: persons
lang: ar
country_code: sa
rules:
  sa_persons_saiqamafield:
    key: saiqama
    is_pii: True
    name: Saudi Iqama by field name
    rule: iqama,iqama_number,iqama_no,residence_permit,saudi_iqama,إقامة,رقم_الإقامة
    type: field
    match: text
  sa_persons_saiqamavalue:
    key: saiqama
    is_pii: True
    name: Saudi Iqama by pattern
    match: ppr
    type: data
    rule: Word(nums, exact=10) | (Word(nums, exact=2) + Literal('-') + Word(nums, exact=7) + Literal('-') + Word(nums, exact=1))
    validator: metacrafterext.rules.common.identifiers.validate_sa_iqama
    maxlen: 12
    minlen: 10
  sa_persons_saidfield:
    key: said
    is_pii: True
    name: Saudi ID by field name
    rule: saudi_id,national_id,saudi_national_id,id_number,identity_number,الهوية_الوطنية,رقم_الهوية
    type: field
    match: text
  sa_persons_saidvalue:
    key: said
    is_pii: True
    name: Saudi ID by pattern
    match: ppr
    type: data
    rule: Word(nums, exact=10)
    validator: metacrafterext.rules.common.identifiers.validate_sa_id
    maxlen: 10
    minlen: 10
  sa_persons_sapassportfield:
    key: sapassport
    is_pii: True
    name: Saudi passport by field name
    rule: passport,passport_number,saudi_passport,جواز_السفر,رقم_جواز_السفر
    type: field
    match: text
  sa_persons_sapassportvalue:
    key: sapassport
    is_pii: True
    name: Saudi passport by pattern
    match: ppr
    type: data
    rule: Word(alphas, exact=1) + Word(nums, exact=8)
    maxlen: 9
    minlen: 9
    # Real format is one letter followed by 8 digits. Even so, there is no
    # check digit, so a value-only match is ambiguous; marked imprecise so it
    # is ignored unless --include-imprecise.
    imprecise: 1

