name: kr-pii
description: Korean person identifiable information (PII)
context: pii
lang: ko
country_code: kr
rules:
  krrrnfield:
    key: krrrn
    is_pii: True
    name: Korean RRN by field name
    rule: rrn,resident_registration_number,주민등록번호,rrn_number,korean_id,national_id
    type: field
    match: text
  krrrnvalue:
    key: krrrn
    is_pii: True
    name: Korean RRN by pattern
    match: ppr
    type: data
    rule: Word(nums, exact=6) + Literal('-') + Word(nums, exact=7)
    maxlen: 14
    minlen: 14
  krpassportfield:
    key: krpassport
    is_pii: True
    name: Korean passport by field name
    rule: passport,여권,passport_number,여권번호,passport_no
    type: field
    match: text
  krpassportvalue:
    key: krpassport
    is_pii: True
    name: Korean passport by pattern
    match: ppr
    type: data
    rule: Word(alphas, exact=1) + Word(nums, exact=8)
    maxlen: 9
    minlen: 9
  krdriverlicfield:
    key: krdriverlic
    is_pii: True
    name: Korean driver license by field name
    rule: driver_license,운전면허,운전면허번호,license_number,driving_license
    type: field
    match: text
  krdriverlicvalue:
    key: krdriverlic
    is_pii: True
    name: Korean driver license by pattern
    match: ppr
    type: data
    rule: Word(nums, exact=12) | (Word(alphas, exact=2) + Word(nums, exact=10))
    maxlen: 12
    minlen: 12
    imprecise: 1

