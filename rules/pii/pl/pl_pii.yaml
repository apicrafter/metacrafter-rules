name: pl-pii
description: Polish person identifiable information (PII)
context: pii
lang: pl
country_code: pl
rules:
  plpeselfield:
    key: plpesel
    is_pii: True
    name: Polish PESEL by field name
    rule: pesel,pesel_number,pesel_no,polish_id,national_id,polish_national_id
    type: field
    match: text
  plpeselvalue:
    key: plpesel
    is_pii: True
    name: Polish PESEL by pattern
    match: ppr
    type: data
    rule: Word(nums, exact=11)
    validator: metacrafterext.rules.common.identifiers.validate_pl_pesel
    maxlen: 11
    minlen: 11
  plpassportfield:
    key: plpassport
    is_pii: True
    name: Polish passport by field name
    rule: paszport,numer_paszportu,paszport_no
    type: field
    match: text
  plpassportvalue:
    key: plpassport
    is_pii: True
    name: Polish passport by pattern
    match: ppr
    type: data
    rule: Word(alphas, exact=2) + Word(nums, exact=7)
    maxlen: 9
    minlen: 9
  pldriverlicfield:
    key: pldriverlic
    is_pii: True
    name: Polish driver license by field name
    rule: prawo_jazdy,numer_prawa_jazdy
    type: field
    match: text
  pldriverlicvalue:
    key: pldriverlic
    is_pii: True
    name: Polish driver license by pattern
    match: ppr
    type: data
    rule: Word(alphas, exact=3) + Word(nums, exact=6)
    maxlen: 9
    minlen: 9
    imprecise: 1

