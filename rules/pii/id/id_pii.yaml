name: id-pii
description: Indonesian person identifiable information (PII)
context: pii
lang: id
country_code: id
rules:
  idnikfield:
    key: idnik
    is_pii: True
    name: Indonesian NIK by field name
    rule: nik,nomor_induk_kependudukan,nik_number,indonesian_id,national_id,ktp_number
    type: field
    match: text
  idnikvalue:
    key: idnik
    is_pii: True
    name: Indonesian NIK by pattern
    match: ppr
    type: data
    rule: Word(nums, exact=16)
    maxlen: 16
    minlen: 16
  idpassportfield:
    key: idpassport
    is_pii: True
    name: Indonesian passport by field name
    rule: passport,paspor,passport_number,nomor_paspor,paspor_no
    type: field
    match: text
  idpassportvalue:
    key: idpassport
    is_pii: True
    name: Indonesian passport by pattern
    match: ppr
    type: data
    rule: Word(alphas, exact=1) + Word(nums, min=7, max=8)
    maxlen: 9
    minlen: 8
  iddriverlicfield:
    key: iddriverlic
    is_pii: True
    name: Indonesian driver license by field name
    rule: driver_license,sim,sim_number,sim_no,driving_license,license_number
    type: field
    match: text
  iddriverlicvalue:
    key: iddriverlic
    is_pii: True
    name: Indonesian driver license by pattern
    match: ppr
    type: data
    rule: Word(alphas, exact=1) + Word(nums, min=11, max=12)
    maxlen: 13
    minlen: 12
    imprecise: 1

