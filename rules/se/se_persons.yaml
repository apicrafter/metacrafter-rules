name: se-persons
description: Swedish person identifiers
context: persons
lang: sv
country_code: se
rules:
  se_persons_sepersonnummerfield:
    key: sepersonnummer
    is_pii: True
    name: Swedish personal number by field name
    rule: swedish_personal_number,personnummer,personnummer_se,swedish_id,personal_id_se
    type: field
    match: text
# Disabled: matches any 10-11 digit number (with optional -/+ separator) and has
# no checksum/date validation, so phone numbers and generic numeric ids are
# flagged. A Swedish personnummer cannot be reliably distinguished by this loose
# pattern; rely on sepersonnummerfield instead.
#  sepersonnummervalue:
#    key: sepersonnummer
#    is_pii: True
#    name: Swedish personal number by pattern
#    match: ppr
#    type: data
#    rule: Word(nums, exact=6) + Optional(Literal('-') | Literal('+')) + Word(nums, exact=4)
#    maxlen: 11
#    minlen: 10
  se_persons_sepassportfield:
    key: sepassport
    is_pii: True
    name: Swedish passport by field name
    rule: swedish_passport,passport_se,passport_sweden
    type: field
    match: text
  se_persons_sepassportvalue:
    key: sepassport
    is_pii: True
    name: Swedish passport by pattern
    match: ppr
    type: data
    rule: Word(nums, exact=8)
    # A bare 8-digit number has no check digit, so a value-only match is highly
    # ambiguous. Marked imprecise so it is ignored unless --include-imprecise.
    imprecise: 1
    maxlen: 8
    minlen: 8

